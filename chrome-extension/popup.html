<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flow2API reCAPTCHA Helper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
    .header { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.off { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .section { padding: 12px 16px; border-bottom: 1px solid #1e293b; }
    .section label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .section input { width: 100%; padding: 6px 8px; background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #e2e8f0; font-size: 12px; outline: none; }
    .section input:focus { border-color: #3b82f6; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px 16px; }
    .stat { text-align: center; }
    .stat .val { font-size: 18px; font-weight: 700; color: #f8fafc; }
    .stat .lbl { font-size: 10px; color: #64748b; text-transform: uppercase; }
    .actions { display: flex; gap: 8px; padding: 12px 16px; }
    .actions button { flex: 1; padding: 6px 0; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-connect { background: #22c55e; color: #fff; }
    .btn-disconnect { background: #ef4444; color: #fff; }
    .btn-save { background: #3b82f6; color: #fff; }
    .logs { max-height: 200px; overflow-y: auto; padding: 0 16px 12px; font-family: monospace; font-size: 11px; line-height: 1.5; }
    .logs .log-entry { padding: 1px 0; }
    .log-time { color: #64748b; }
    .log-INFO { color: #94a3b8; }
    .log-WARN { color: #f59e0b; }
    .log-ERROR { color: #ef4444; }
    .log-SUCCESS { color: #22c55e; }
    .log-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; }
    .log-header span { font-size: 11px; color: #64748b; text-transform: uppercase; }
    .log-header button { background: none; border: none; color: #64748b; font-size: 11px; cursor: pointer; }
    .log-header button:hover { color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot off" id="statusDot"></div>
    <h1>Flow2API reCAPTCHA Helper</h1>
  </div>

  <div class="section">
    <label>WebSocket 地址</label>
    <input type="text" id="wsUrl" placeholder="ws://your-server:8000/ws/captcha">
  </div>
  <div class="section">
    <label>认证密钥（可选）</label>
    <input type="password" id="authKey" placeholder="留空则不认证">
  </div>

  <div class="stats">
    <div class="stat"><div class="val" id="statSolved">0</div><div class="lbl">已解决</div></div>
    <div class="stat"><div class="val" id="statErrors">0</div><div class="lbl">错误</div></div>
    <div class="stat"><div class="val" id="statConnected">-</div><div class="lbl">状态</div></div>
  </div>

  <div class="actions">
    <button class="btn-save" id="btnSave">保存配置</button>
    <button class="btn-connect" id="btnConnect">连接</button>
    <button class="btn-disconnect" id="btnDisconnect">断开</button>
  </div>

  <div class="log-header">
    <span>日志</span>
    <button id="btnClearLogs">清空</button>
  </div>
  <div class="logs" id="logContainer"></div>

  <script src="popup.js"></script>
</body>
</html>
