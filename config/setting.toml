[global]
api_key = "han1234"
admin_username = "admin"
admin_password = "admin"

[flow]
labs_base_url = "https://labs.google/fx/api"
api_base_url = "https://aisandbox-pa.googleapis.com/v1"
timeout = 120
max_retries = 4
image_request_timeout = 40
image_timeout_retry_count = 1
image_timeout_retry_delay = 0.8
image_timeout_use_media_proxy_fallback = true
image_prefer_media_proxy = true
image_slot_wait_timeout = 900
image_launch_soft_limit = 25
image_launch_wait_timeout = 900
image_launch_stagger_ms = 250
video_slot_wait_timeout = 480
video_launch_soft_limit = 20
video_launch_wait_timeout = 480
video_launch_stagger_ms = 250
poll_interval = 3.0
max_poll_attempts = 200

[server]
host = "0.0.0.0"
port = 8000

[debug]
enabled = false
log_requests = true
log_responses = true
mask_token = true

[proxy]
proxy_enabled = false
proxy_url = ""

[generation]
image_timeout = 300
video_timeout = 1500

[admin]
error_ban_threshold = 3

[cache]
enabled = false
timeout = 7200  # Cache timeout in seconds, default 2 hours
base_url = ""   # Base URL for cached file access, leave empty to use server address

[captcha]
captcha_method = "browser"  # Captcha method: yescaptcha/browser/personal/remote_browser
browser_recaptcha_settle_seconds = 1.0  # Extra settle wait after captcha completion, set 1.0 for speed
browser_launch_background = true  # Browser captcha launches in background by default (minimized/avoids stealing focus)
yescaptcha_api_key = ""  # YesCaptcha API key
yescaptcha_base_url = "https://api.yescaptcha.com"
remote_browser_base_url = ""  # Remote headed captcha service URL
remote_browser_api_key = ""   # Remote headed captcha service API key
remote_browser_timeout = 60   # Remote headed captcha request timeout (seconds)

[i18n]
language = "en"
